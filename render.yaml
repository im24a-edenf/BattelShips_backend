databases:
  - name: battleships-db
    databaseName: battleships
    plan: free

services:
  - type: web
    name: battleships-backend
    runtime: java
    plan: free
    buildCommand: mvn clean package -DskipTests
    startCommand: java -jar target/*.jar
    healthCheckPath: /actuator/health
    envVars:
      - key: PGHOST
        fromDatabase:
          name: battleships-db
          property: host
      - key: PGPORT
        fromDatabase:
          name: battleships-db
          property: port
      - key: PGDATABASE
        fromDatabase:
          name: battleships-db
          property: database
      - key: PGUSER
        fromDatabase:
          name: battleships-db
          property: user
      - key: PGPASSWORD
        fromDatabase:
          name: battleships-db
          property: password
      - key: PRODUCTION
        value: "true"
      - key: ALLOWED_ORIGINS
        value: https://yourapp.vercel.app
