spring.application.name=spring-boot-security-db-template

server.port=${PORT:8080}

# PostgreSQL Database Configuration
spring.datasource.url=jdbc:postgresql://${PGHOST:localhost}:${PGPORT:5432}/${PGDATABASE:battleships}
spring.datasource.username=${PGUSER:postgres}
spring.datasource.password=${PGPASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# JWT Configuration
jwt.secret-key=VGhpcy1pcy1hLXNob3djYXNlLXNlY3JldC1rZXktZm9yLXNwcmluZ2ludHJvLTIwMjY=
# JWT token expiration time in milliseconds (900000ms = 15 minutes)
jwt.expiration=900000
jwt.cookie-name=jwt-cookie
# JWT cookie max age in seconds (86400s = 24 hours)
jwt.cookie-max-age=86400

# Actuator (Render health check)
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never
