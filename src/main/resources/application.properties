spring.application.name=spring-boot-security-db-template

server.port=${PORT:8080}

# MySQL Database Configuration
spring.datasource.url=jdbc:mysql://${MYSQLHOST:localhost}:${MYSQLPORT:3306}/${MYSQLDATABASE:springintro}?serverTimezone=UTC&allowPublicKeyRetrieval=true&useSSL=false
spring.datasource.username=${MYSQLUSER:root}
spring.datasource.password=${MYSQLPASSWORD:hello12345}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# JWT Configuration
jwt.secret-key=VGhpcy1pcy1hLXNob3djYXNlLXNlY3JldC1rZXktZm9yLXNwcmluZ2ludHJvLTIwMjY=
# JWT token expiration time in milliseconds (900000ms = 15 minutes)
# This is the token's internal validity period. After this time, the token is rejected by the backend.
jwt.expiration=900000
jwt.cookie-name=jwt-cookie
# JWT cookie max age in seconds (86400s = 24 hours)
# Note: Without refresh tokens, users will be logged out after jwt.expiration time, even if this cookie persists.
# This setting would be useful with refresh token implementation for better UX.
jwt.cookie-max-age=86400

# Actuator (Railway health check)
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never
